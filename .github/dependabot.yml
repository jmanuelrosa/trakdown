version: 2
updates:
  # npm / pnpm — single root entry. Dependabot reads pnpm-workspace.yaml
  # and discovers all workspace members (apps/extension, apps/web) automatically.
  # Listing member directories explicitly causes errors because they don't
  # have their own lockfile (pnpm puts a single pnpm-lock.yaml at the root).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    # Disable version-update PRs. Security alerts still surface automatically
    # via Dependabot alerts (independent of this config).
    open-pull-requests-limit: 0
    groups:
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-dependencies:
        dependency-type: production
        update-types:
          - patch
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope
    ignore:
      # Pin @types/node to match .nvmrc major version (Node 24)
      - dependency-name: "@types/node"
        versions: [">= 25"]

  # GitHub Actions — workflows under .github/workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci

  # GitHub Actions — composite action (separate entry because it lives outside
  # .github/workflows and Dependabot scans each action manifest independently)
  - package-ecosystem: github-actions
    directory: "/.github/actions/setup-node"
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
