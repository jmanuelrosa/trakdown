name: Deploy web

# Pull requests targeting main run the build only (quality gate — catches
# broken builds before merge). Push to main runs build + deploy. Manual
# dispatch from the Actions tab also deploys.
on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".github/workflows/deploy-web.yml"
      - ".github/actions/setup-node/action.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".github/workflows/deploy-web.yml"
      - ".github/actions/setup-node/action.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - id: setup
        uses: ./.github/actions/setup-node

      - name: Build apps/web
        env:
          UMAMI_WEBSITE_ID: ${{ vars.UMAMI_WEBSITE_ID }}
        run: pnpm -F @trakdown/web build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    # Only deploy on push to main or manual dispatch — PR builds validate
    # without publishing.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    # GitHub Pages requires serial deployments. Scoped to the deploy job so
    # PR builds run freely without queuing behind in-flight deploys.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
