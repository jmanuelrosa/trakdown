<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>trakdown — capture any page as markdown</title>

  <defs>
    <radialGradient id="vignette" cx="50%" cy="0%" r="65%">
      <stop offset="0%" stop-color="#0F8B7E" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0F8B7E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background: warm cream -->
  <rect width="1200" height="630" fill="#FBF7EE"/>
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Wordmark with brand cursor bar -->
  <g transform="translate(80, 170)">
    <rect x="0" y="22" width="14" height="76" fill="#0F8B7E"/>
    <text x="32" y="86"
      font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace"
      font-size="56" font-weight="700" fill="#1A1815" letter-spacing="-1.2">trakdown</text>
  </g>

  <!-- Headline -->
  <text x="80" y="360"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="62" font-weight="600" fill="#1A1815" letter-spacing="-1.8">
    Capture any page as <tspan fill="#0F8B7E" font-weight="700">markdown</tspan>.
  </text>

  <!-- Subline -->
  <text x="80" y="420"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="36" font-weight="400" font-style="italic" fill="#5A5550" letter-spacing="-0.4">
    — even the ones behind your login.
  </text>

  <!-- Picker overlay decoration: a "picked" sample on the right -->
  <g transform="translate(870, 460)">
    <rect x="0" y="0" width="240" height="80" rx="2"
      fill="rgba(15, 139, 126, 0.16)" stroke="#0F8B7E" stroke-width="2"/>
    <rect x="172" y="-12" width="60" height="22" rx="3" fill="#0F8B7E"/>
    <text x="178" y="3"
      font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace"
      font-size="12" font-weight="600" fill="#FBF7EE">picked</text>
    <text x="18" y="34"
      font-family="-apple-system, BlinkMacSystemFont, sans-serif"
      font-size="14" font-weight="500" fill="#1A1815">CVE-2026-9128</text>
    <text x="18" y="58"
      font-family="-apple-system, BlinkMacSystemFont, sans-serif"
      font-size="13" font-weight="400" fill="#5A5550">vulnerability table · 47 rows</text>
  </g>

  <!-- Bottom credit -->
  <text x="80" y="585"
    font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace"
    font-size="22" font-weight="400" fill="#1A1815" opacity="0.55">
    github.com/jmanuelrosa/trakdown · MIT licensed
  </text>
</svg>
