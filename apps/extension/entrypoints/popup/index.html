<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>trakdown</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400..700&display=swap"
    />
    <link rel="stylesheet" href="./main.css" />
  </head>
  <body>
    <header class="topbar">
      <span class="wordmark">trakdown</span>
      <span class="version">v0.0.1</span>
    </header>
    <main>
      <div class="dest" role="group" aria-label="Capture destination">
        <button
          type="button"
          class="dest-opt is-active"
          data-dest="clipboard"
          aria-pressed="true"
        >
          Copy
        </button>
        <button type="button" class="dest-opt" data-dest="download" aria-pressed="false">
          Save .md
        </button>
      </div>
      <div class="actions">
        <button
          id="capture-element"
          type="button"
          data-mode="element"
          data-command="capture-element"
          class="btn btn-primary"
        >
          <span class="btn-label">Pick element</span>
          <kbd hidden></kbd>
        </button>
        <button
          id="capture-selection"
          type="button"
          data-mode="selection"
          data-command="capture-selection"
          class="btn btn-ghost"
        >
          <span class="btn-label">Capture selection</span>
          <kbd hidden></kbd>
        </button>
        <button
          id="capture-page"
          type="button"
          data-mode="page"
          data-command="capture-page"
          class="btn btn-ghost"
        >
          <span class="btn-label">Capture page</span>
          <kbd hidden></kbd>
        </button>
        <button
          id="capture-page-ai"
          type="button"
          data-mode="page-ai"
          data-command="capture-page-ai"
          class="btn btn-ghost btn-ai"
          data-ai-state="checking"
          disabled
        >
          <span class="btn-top">
            <span class="label">Capture page (AI)</span>
            <kbd hidden></kbd>
          </span>
          <span class="hint">checking on-device AI…</span>
        </button>
      </div>
      <p id="status" role="status" aria-live="polite">Ready</p>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
