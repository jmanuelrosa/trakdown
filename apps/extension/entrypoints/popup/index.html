<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>trakdown</title>
    <link rel="stylesheet" href="./main.css" />
  </head>
  <body>
    <main>
      <h1>trakdown</h1>
      <div class="actions">
        <button id="capture-element" type="button" data-mode="element">
          Pick element
        </button>
        <button id="capture-selection" type="button" data-mode="selection">
          Capture selection
        </button>
        <button id="capture-page" type="button" data-mode="page">
          Capture page
        </button>
        <button id="capture-page-ai" type="button" data-mode="page-ai" data-ai-state="checking" disabled>
          <span class="label">Capture page (AI clean)</span>
          <span class="hint">checking on-device AI…</span>
        </button>
      </div>
      <p id="status" role="status" aria-live="polite"></p>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
